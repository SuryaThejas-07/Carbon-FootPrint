steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/web/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=${_API_BASE_URL}
      - --build-arg
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/carbonwise/carbonwise-web:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/carbonwise/carbonwise-web:latest
      - .

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/carbonwise/carbonwise-web:${_TAG}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/carbonwise/carbonwise-web:latest

substitutions:
  _REGION: asia-south1
  _TAG: build
  _API_BASE_URL: http://localhost:8080
  _GOOGLE_MAPS_API_KEY: ''
  _FIREBASE_API_KEY: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''
