name: CarbonWise AI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
         # Ignore postinstall errors since they require database schema generation which is handled in subsequent steps
        run: npm ci --workspaces --include-workspace-root --ignore-scripts

      - name: Generate database client
        run: npm run db:generate

      - name: Install prisma binary
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Build packages
        run: |
          npm run build --workspace @carbonwise/database
          npm run build --workspace @carbonwise/shared

      - name: Run unit tests
        run: npm run test --workspace @carbonwise/shared

      - name: Run lint checks
        run: npm run lint --workspaces --if-present

      - name: Run type checking
        run: npm run typecheck --workspaces --if-present

      - name: Build API and Frontend
        run: |
          npm run build --workspace @carbonwise/api
          npm run build --workspace @carbonwise/web

